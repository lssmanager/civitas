name: Import Logto multi-tenant SaaS sample

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-sample:
    if: ${{ !contains(github.event.head_commit.message, 'Import Logto multi-tenant SaaS sample') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Civitas
        uses: actions/checkout@v4
        with:
          path: target
          persist-credentials: true

      - name: Checkout Logto sample
        uses: actions/checkout@v4
        with:
          repository: logto-io/multi-tenant-saas-sample
          ref: master
          path: source

      - name: Replace Civitas with sample contents
        shell: bash
        run: |
          set -euo pipefail

          cd target
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cd ../source
          tar --exclude=.git --exclude=.github -cf - . | tar -C ../target -xf -

      - name: Commit imported sample
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Import Logto multi-tenant SaaS sample"
          git push
