services:
  api:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - default
      - loginet
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_WAIT_TIMEOUT_MS: ${DATABASE_WAIT_TIMEOUT_MS:-60000}
      DATABASE_WAIT_INTERVAL_MS: ${DATABASE_WAIT_INTERVAL_MS:-2000}
      DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-1500}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-false}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-civitas}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_JWKS_URL: ${LOGTO_JWKS_URL:-}
      LOGTO_ISSUER: ${LOGTO_ISSUER:-}
      LOGTO_API_RESOURCE_INDICATOR: ${LOGTO_API_RESOURCE_INDICATOR:-}
      LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT: ${LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT:-}
      LOGTO_MANAGEMENT_API_APPLICATION_ID: ${LOGTO_MANAGEMENT_API_APPLICATION_ID:-}
      LOGTO_MANAGEMENT_API_APPLICATION_SECRET: ${LOGTO_MANAGEMENT_API_APPLICATION_SECRET:-}
      LOGTO_MANAGEMENT_API_RESOURCE: ${LOGTO_MANAGEMENT_API_RESOURCE:-}
      FLUENTCRM_BASE_URL: ${FLUENTCRM_BASE_URL:-}
      FLUENTCRM_USERNAME: ${FLUENTCRM_USERNAME:-}
      FLUENTCRM_APP_PASSWORD: ${FLUENTCRM_APP_PASSWORD:-}
      FLUENTCRM_PREVIOUS_EMAIL_FIELD_KEY: ${FLUENTCRM_PREVIOUS_EMAIL_FIELD_KEY:-}
    ports:
      - "${BACKEND_PUBLIC_PORT:-3000}:${BACKEND_PORT:-3000}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.civitas-api.rule=Host(`civitas.socialstudies.cloud`) && PathPrefix(`/api`)
      - traefik.http.routers.civitas-api.entrypoints=http,https
      - traefik.http.routers.civitas-api.tls=true
      - traefik.http.routers.civitas-api.tls.certresolver=letsencrypt
      - traefik.http.routers.civitas-api.middlewares=civitas-api-strip
      - traefik.http.routers.civitas-api.priority=100
      - traefik.http.middlewares.civitas-api-strip.stripprefix.prefixes=/api
      - traefik.http.services.civitas-api.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 75s

  worker:
    build:
      context: ./backend
    command: ["npm", "run", "start:worker"]
    restart: unless-stopped
    networks:
      - default
      - loginet
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-civitas}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT: ${LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT:-}
      LOGTO_MANAGEMENT_API_APPLICATION_ID: ${LOGTO_MANAGEMENT_API_APPLICATION_ID:-}
      LOGTO_MANAGEMENT_API_APPLICATION_SECRET: ${LOGTO_MANAGEMENT_API_APPLICATION_SECRET:-}
      LOGTO_MANAGEMENT_API_RESOURCE: ${LOGTO_MANAGEMENT_API_RESOURCE:-}
      FLUENTCRM_BASE_URL: ${FLUENTCRM_BASE_URL:-}
      FLUENTCRM_USERNAME: ${FLUENTCRM_USERNAME:-}
      FLUENTCRM_APP_PASSWORD: ${FLUENTCRM_APP_PASSWORD:-}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://civitas.socialstudies.cloud/api}
        VITE_ENABLE_LOGTO: ${VITE_ENABLE_LOGTO:-true}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-https://auth.learnsocialstudies.com/}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-avc4zf5kjm5rgc5xgsegh}
        VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR:-https://civitas.socialstudies.cloud/api}
        VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI:-https://civitas.socialstudies.cloud/callback}
        VITE_APP_SIGN_OUT_REDIRECT_URI: ${VITE_APP_SIGN_OUT_REDIRECT_URI:-https://civitas.socialstudies.cloud}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://civitas.socialstudies.cloud/api}
      VITE_ENABLE_LOGTO: ${VITE_ENABLE_LOGTO:-true}
      VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-https://auth.learnsocialstudies.com/}
      VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-avc4zf5kjm5rgc5xgsegh}
      VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR:-https://civitas.socialstudies.cloud/api}
      VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI:-https://civitas.socialstudies.cloud/callback}
      VITE_APP_SIGN_OUT_REDIRECT_URI: ${VITE_APP_SIGN_OUT_REDIRECT_URI:-https://civitas.socialstudies.cloud}
      PREVIEW_ALLOWED_HOSTS: ${PREVIEW_ALLOWED_HOSTS:-civitas.socialstudies.cloud}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-5173}:5173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.civitas-frontend.rule=Host(`civitas.socialstudies.cloud`)
      - traefik.http.routers.civitas-frontend.entrypoints=http,https
      - traefik.http.routers.civitas-frontend.tls=true
      - traefik.http.routers.civitas-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.civitas-frontend.priority=1
      - traefik.http.services.civitas-frontend.loadbalancer.server.port=5173
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  default:
  loginet:
    external: true
