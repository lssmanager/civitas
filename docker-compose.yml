services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - default
      - loginet
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://user:password@your-postgres-host:5432/civitas}
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_JWKS_URL: ${LOGTO_JWKS_URL:-}
      LOGTO_ISSUER: ${LOGTO_ISSUER:-}
      LOGTO_API_RESOURCE_INDICATOR: ${LOGTO_API_RESOURCE_INDICATOR:-}
      LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT: ${LOGTO_MANAGEMENT_API_TOKEN_ENDPOINT:-}
      LOGTO_MANAGEMENT_API_APPLICATION_ID: ${LOGTO_MANAGEMENT_API_APPLICATION_ID:-}
      LOGTO_MANAGEMENT_API_APPLICATION_SECRET: ${LOGTO_MANAGEMENT_API_APPLICATION_SECRET:-}
      LOGTO_MANAGEMENT_API_RESOURCE: ${LOGTO_MANAGEMENT_API_RESOURCE:-}
    ports:
      - "${BACKEND_PUBLIC_PORT:-3000}:${BACKEND_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://civitas.socialstudies.cloud/api}
        VITE_ENABLE_LOGTO: ${VITE_ENABLE_LOGTO:-true}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-https://auth.learnsocialstudies.com/}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-avc4zf5kjm5rgc5xgsegh}
        VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR:-https://civitas.socialstudies.cloud/api}
        VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI:-https://civitas.socialstudies.cloud/callback}
        VITE_APP_SIGN_OUT_REDIRECT_URI: ${VITE_APP_SIGN_OUT_REDIRECT_URI:-https://civitas.socialstudies.cloud}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://civitas.socialstudies.cloud/api}
      VITE_ENABLE_LOGTO: ${VITE_ENABLE_LOGTO:-true}
      VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT:-https://auth.learnsocialstudies.com/}
      VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID:-avc4zf5kjm5rgc5xgsegh}
      VITE_API_RESOURCE_INDICATOR: ${VITE_API_RESOURCE_INDICATOR:-https://civitas.socialstudies.cloud/api}
      VITE_APP_REDIRECT_URI: ${VITE_APP_REDIRECT_URI:-https://civitas.socialstudies.cloud/callback}
      VITE_APP_SIGN_OUT_REDIRECT_URI: ${VITE_APP_SIGN_OUT_REDIRECT_URI:-https://civitas.socialstudies.cloud}
      PREVIEW_ALLOWED_HOSTS: ${PREVIEW_ALLOWED_HOSTS:-civitas.socialstudies.cloud}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-5173}:5173"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  default:
  loginet:
    external: true
