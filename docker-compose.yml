services:
  postgres:
    image: postgres:16-alpine
    container_name: civitas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: civitas
      POSTGRES_USER: civitas
      POSTGRES_PASSWORD: civitas
    ports:
      - "5432:5432"
    volumes:
      - civitas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civitas -d civitas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  civitas-postgres-data:
